type User @table {
  email: String!
  createdAt: Timestamp!
  displayName: String
  planTier: String
}

type Recipe @table {
  user: User!
  name: String!
  promptTemplate: String!
  isActive: Boolean
  lastRanAt: Timestamp
}

type Trigger @table {
  recipe: Recipe!
  type: String!
  config: String!
  description: String
}

type Generation @table {
  recipe: Recipe!
  outputContent: String!
  status: String!
  errorMessage: String
  tokensUsed: Int64
}

type Template @table {
  user: User!
  body: String!
  version: String
  tags: [String]
}