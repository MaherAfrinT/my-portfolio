mutation CreateUser {
  user_insert(data: { email: "user@example.com", createdAt_expr: "request.time", displayName: "New User" })
}

mutation UpdateUser($data: User_Data!) @auth(level: USER) {
  user_update(key: { id_expr: "auth.uid" }, data: $data)
}

mutation DeleteUser @auth(level: USER) {
  user_delete(key: { id_expr: "auth.uid" })
}

query GetCurrentUser @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    email
    displayName
    planTier
  }
}

query ListAllUsers @auth(level: PUBLIC, insecureReason: "Publicly listing user profiles for discovery") {
  users {
    email
    displayName
  }
}

mutation CreateRecipe($name: String!, $template: String!) @auth(level: USER) {
  recipe_insert(data: { 
    user: { id_expr: "auth.uid" }, 
    name: $name, 
    promptTemplate: $template 
  })
}

mutation UpdateRecipe($id: UUID!, $data: Recipe_Data!) @auth(level: USER) {
  recipe_update(key: { id: $id }, data: $data)
}

mutation DeleteRecipe($id: UUID!) @auth(level: USER) {
  recipe_delete(key: { id: $id })
}

query GetMyRecipes @auth(level: USER) {
  recipes(where: { userId: { eq_expr: "auth.uid" } }) {
    id
    name
  }
}

query ListAllRecipes @auth(level: PUBLIC, insecureReason: "Recipes are shared publicly") {
  recipes {
    name
    promptTemplate
  }
}

mutation CreateTrigger($recipeId: UUID!, $type: String!, $config: String!) @auth(level: USER) {
  trigger_insert(data: { 
    recipe: { id: $recipeId }, 
    type: $type, 
    config: $config 
  })
}

mutation UpdateTrigger($id: UUID!, $data: Trigger_Data!) @auth(level: USER) {
  trigger_update(key: { id: $id }, data: $data)
}

mutation DeleteTrigger($id: UUID!) @auth(level: USER) {
  trigger_delete(key: { id: $id })
}

query GetRecipeTriggers($recipeId: UUID!) @auth(level: USER) {
  triggers(where: { recipeId: { eq: $recipeId } }) {
    type
    config
  }
}

query ListTriggers @auth(level: PUBLIC, insecureReason: "Triggers are non-sensitive data") {
  triggers {
    type
    description
  }
}

mutation CreateGeneration($recipeId: UUID!, $content: String!, $status: String!) @auth(level: USER) {
  generation_insert(data: { 
    recipe: { id: $recipeId }, 
    outputContent: $content, 
    status: $status 
  })
}

mutation UpdateGeneration($id: UUID!, $data: Generation_Data!) @auth(level: USER) {
  generation_update(key: { id: $id }, data: $data)
}

mutation DeleteGeneration($id: UUID!) @auth(level: USER) {
  generation_delete(key: { id: $id })
}

query GetGenerationsForRecipe($recipeId: UUID!) @auth(level: USER) {
  generations(where: { recipeId: { eq: $recipeId } }) {
    outputContent
    status
  }
}

query ListGenerations @auth(level: PUBLIC, insecureReason: "Public feed of generations") {
  generations {
    outputContent
    status
  }
}

mutation CreateTemplate($body: String!, $tags: [String!]) @auth(level: USER) {
  template_insert(data: { 
    user: { id_expr: "auth.uid" }, 
    body: $body, 
    tags: $tags 
  })
}

mutation UpdateTemplate($id: UUID!, $data: Template_Data!) @auth(level: USER) {
  template_update(key: { id: $id }, data: $data)
}

mutation DeleteTemplate($id: UUID!) @auth(level: USER) {
  template_delete(key: { id: $id })
}

query GetMyTemplates @auth(level: USER) {
  templates(where: { userId: { eq_expr: "auth.uid" } }) {
    body
    version
  }
}

query ListTemplates @auth(level: PUBLIC, insecureReason: "Public templates directory") {
  templates {
    body
    tags
  }
}